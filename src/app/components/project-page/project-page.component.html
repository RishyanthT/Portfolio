<app-navbar></app-navbar>

<main class="page">
  <section class="container">
    <app-hero></app-hero>

    <div class="projects-wrapper">
      <button
        class="scroll-btn left"
        (click)="scroll('left')"
        aria-label="Scroll Left"
      >
        ‹
      </button>

      <div class="projects-scroll" #scrollContainer>
        @for (project of projects; track project.title) {
          <article class="card">
            <div class="card-body">
              <h3>{{ project.title }}</h3>
              <p class="caption">{{ project.description }}</p>

              <div class="tag-list">
                @for (tag of project.tags; track tag) {
                  <span class="tag">{{ tag }}</span>
                }
              </div>
            </div>
            <a [href]="project.link" class="project-link">View Project →</a>
          </article>
        }
      </div>

      <button
        class="scroll-btn right"
        (click)="scroll('right')"
        aria-label="Scroll Right"
      >
        ›
      </button>
    </div>

    <div class="divider"></div>

    <section class="section" id="contact">
      <div class="section-head">
        <h2>Let's Work Together</h2>
        <p class="caption">Open to opportunities and collaborations.</p>
      </div>

      <div class="contact">
        <div class="btn-group">
          <a class="primary" href="mailto:your@email.com">Get in touch</a>
          <a class="secondary" href="#">Download CV</a>
        </div>
      </div>
    </section>
  </section>
</main>
