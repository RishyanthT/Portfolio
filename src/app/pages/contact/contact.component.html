<app-navbar></app-navbar>

<main class="page">
  <section class="container">
    <header class="header">
      <h1>Get in touch</h1>
      <p>
        Have a question, opportunity, or just want to say hi? Feel free to reach
        out.
      </p>
    </header>

    <section class="card">
      <form class="form">
        <label>
          <span>Your name</span>
          <input type="text" placeholder="Name" />
        </label>

        <label>
          <span>Email address</span>
          <input type="email" placeholder="example@email.com" />
        </label>

        <label>
          <span>Message</span>
          <textarea
            rows="5"
            placeholder="Tell me about your project..."
          ></textarea>
        </label>

        <button type="submit" class="primary">Send message</button>
      </form>

      <aside class="meta">
        <div>
          <h3>Email</h3>
          <a href="mailto:your&#64;email.com">your&#64;email.com</a>
        </div>

        <div>
          <h3>Location</h3>
          <p>Canada</p>
        </div>

        <div>
          <h3>Links</h3>
          <ul>
            <li><a href="#">GitHub</a></li>
            <li><a href="#">LinkedIn</a></li>
          </ul>
        </div>
      </aside>
    </section>
  </section>
</main>
